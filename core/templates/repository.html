{% extends 'base.html' %}
{% block title %}Your Bullet Repository{% endblock %}
{% block content %}
<section class="workspace-shell" data-workspace-shell>
    <aside class="document-tabs" aria-label="Resume sections">
        <div class="tabs-topline">
            <button type="button" class="collapse-tabs-button" aria-label="Collapse sections" aria-expanded="true" data-toggle-sections>‹</button>
        </div>
        <div class="tabs-heading-row">
            <h2>Sections</h2>
            <form method="post" action="{% url 'add_section' %}" class="add-tab-form">
                {% csrf_token %}
                <input type="hidden" name="name" value="Untitled section" />
                <button type="submit" class="icon-button" aria-label="Add section">+</button>
            </form>
            <button type="button" class="collapse-tabs-button" aria-label="Collapse sections" aria-expanded="true" data-toggle-sections>‹</button>
        </div>
        <div class="tabs-heading-row">
            <h2>Sections</h2>
        </div>
        <nav class="tab-list">
            {% for section in sections %}
                <div class="doc-tab {% if active_section.id == section.id %}active{% endif %}">
                    <a class="doc-icon" href="{% url 'repository_section' section.id %}" aria-label="Open {{ section.name }}">▤</a>
                    <form method="post" action="{% url 'update_section' section.id %}" class="rename-section-form">
                        {% csrf_token %}
                        <input
                            class="doc-title-input"
                            name="name"
                            value="{{ section.name }}"
                            aria-label="Section name"
                            readonly
                            data-original-value="{{ section.name }}"
                        />
                    </form>
                    <a class="doc-menu" href="{% url 'repository_section' section.id %}" aria-label="Open {{ section.name }}">⋮</a>
                </div>
            {% endfor %}
        </nav>
    </aside>

    <div class="workspace-content workspace-content-blank" aria-label="Blank workspace"></div>
</section>
<script>
    (() => {
        const shell = document.querySelector('[data-workspace-shell]');
        const toggle = document.querySelector('[data-toggle-sections]');

        if (shell && toggle) {
            toggle.addEventListener('click', () => {
                const isCollapsed = shell.classList.toggle('sections-collapsed');
                toggle.setAttribute('aria-expanded', String(!isCollapsed));
                toggle.setAttribute('aria-label', isCollapsed ? 'Expand sections' : 'Collapse sections');
                toggle.textContent = isCollapsed ? '›' : '‹';
            });
        }

        document.querySelectorAll('.doc-title-input').forEach((input) => {
            input.addEventListener('dblclick', () => {
                input.readOnly = false;
                input.focus();
                input.select();
            });

            input.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    input.blur();
                }

                if (event.key === 'Escape') {
                    input.value = input.dataset.originalValue || input.defaultValue;
                    input.readOnly = true;
                    input.blur();
                }
            });

            input.addEventListener('blur', () => {
                if (input.readOnly) {
                    return;
                }

                const nextValue = input.value.trim();
                const originalValue = input.dataset.originalValue || input.defaultValue;

                if (!nextValue) {
                    input.value = originalValue;
                    input.readOnly = true;
                    return;
                }

                input.value = nextValue;
                input.readOnly = true;

                if (nextValue !== originalValue) {
                    input.form.submit();
                }
            });
        });
    })();
</script>
{% endblock %}
